name: Update Submodules

on:
  schedule:
    # Roda a cada hora. Ajuste conforme necessidade.
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-submodules:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout parent repo with submodules
        uses: actions/checkout@v4
        with:
          submodules: true
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Update submodules to latest commit
        run: |
          git submodule update --remote
          git submodule status

      - name: Commit and push if changed
        run: |
          git add .
          if git diff --cached --quiet; then
            echo "Nenhuma atualização de submodule encontrada."
            exit 0
          fi
          git commit -m "chore: atualiza submodules para ultimo commit"
          git push
